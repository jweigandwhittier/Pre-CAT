services:
  precat_app:
    build: .
    container_name: precat_app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G
    networks:
      - caddy-net
    environment:
      - STREAMLIT_SERVER_MAX_UPLOAD_SIZE=3000
      - TOOLBOX_PATH=/opt/bart
      - BART_TOOLBOX_PATH=/opt/bart

networks:
  caddy-net:
    external: true